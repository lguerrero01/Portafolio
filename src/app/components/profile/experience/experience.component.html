<section class="section" id="experience">
  <div class="container">
    <div class="pf-head">
      <span class="pf-eyebrow">Trayectoria</span>
      <h2 class="pf-title">Experiencia profesional</h2>
    </div>

    <div class="pf-timeline">
      <article class="pf-tl-item" *ngFor="let exp of workExp" data-aos="fade-up">
        <div class="pf-tl-marker"><span></span></div>
        <div class="pf-tl-card">
          <div class="pf-tl-top">
            <h3 class="pf-tl-role">{{ exp.role }}</h3>
            <span class="pf-tl-date">{{ exp.timeline }}</span>
          </div>
          <p class="pf-tl-company">
            <i class="fa fa-briefcase"></i> {{ exp.company }}
            <span class="pf-tl-loc"> · {{ exp.location }}</span>
          </p>
          <ul class="pf-tl-work">
            <li *ngFor="let work of exp.work | split">{{ work }}</li>
          </ul>
          <div class="pf-tl-stack" *ngIf="exp.stack?.length">
            <span class="pf-chip" *ngFor="let t of exp.stack">{{ t }}</span>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
