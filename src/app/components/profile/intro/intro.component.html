<section class="pf-hero" id="home">
  <div class="pf-hero__glow" aria-hidden="true"></div>
  <div class="container pf-hero__inner">
    <div class="pf-hero__content" data-aos="fade-up">
      <span class="pf-hero__status">
        <span class="pf-hero__dot"></span> Disponible para nuevos proyectos
      </span>
      <h1 class="pf-hero__name">Luis Alejandro <span>Guerrero</span></h1>
      <p class="pf-hero__role">{{ role }}</p>
      <p class="pf-hero__tagline">{{ tagline }}</p>

      <div class="pf-hero__cta">
        <a class="pf-btn" href="#projects">Ver proyectos</a>
        <a class="pf-btn pf-btn--ghost" href="#contact">Contáctame</a>
        <!-- Botón "Descargar CV" oculto temporalmente
        <a class="pf-btn pf-btn--ghost" [href]="cvUrlEs" target="_blank" rel="noopener">Descargar CV</a>
        -->
      </div>

      <div class="pf-hero__socials">
        <a [href]="socials.github" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa fa-github"></i></a>
        <a [href]="socials.linkedin" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fa fa-linkedin"></i></a>
        <a [href]="socials.twitter" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa fa-twitter"></i></a>
        <a [href]="socials.instagram" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa fa-instagram"></i></a>
      </div>
    </div>

    <div class="pf-hero__aside" data-aos="fade-up" data-aos-delay="120">
      <div class="pf-hero__photo">
        <img src="assets/img/profile.jpg" alt="Foto de Luis Alejandro Guerrero" width="760" height="1013" />
      </div>
      <div class="pf-stats">
        <div class="pf-stat" *ngFor="let s of stats">
          <span class="pf-stat__value">{{ s.value }}</span>
          <span class="pf-stat__label">{{ s.label }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
