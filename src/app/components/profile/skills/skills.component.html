<section class="section" id="skill">
  <div class="container">
    <div class="pf-head">
      <span class="pf-eyebrow">Stack</span>
      <h2 class="pf-title">Tecnologías con las que trabajo</h2>
      <p class="pf-lead">Herramientas que uso a diario para llevar un producto de la idea a producción.</p>
    </div>

    <div class="pf-skills">
      <div class="pf-skill-group" *ngFor="let group of groups" data-aos="fade-up">
        <div class="pf-skill-group__head">
          <span class="pf-skill-group__dot"></span>
          <h3 class="pf-skill-group__title">{{ group.category }}</h3>
        </div>
        <div class="pf-skill-grid">
          <div class="pf-skill" *ngFor="let item of group.items">
            <svg *ngIf="item.svg" class="pf-skill__svg" viewBox="0 0 24 24" aria-hidden="true">
              <path [attr.d]="item.svg"></path>
            </svg>
            <i *ngIf="!item.svg && item.icon" [class]="item.icon" aria-hidden="true"></i>
            <span class="pf-skill__badge" *ngIf="!item.svg && !item.icon" aria-hidden="true">{{ item.name.charAt(0) }}</span>
            <span class="pf-skill__name">{{ item.name }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
