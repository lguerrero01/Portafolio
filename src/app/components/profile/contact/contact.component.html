<section class="section" id="contact">
  <div class="container">
    <div class="pf-head">
      <span class="pf-eyebrow">Contacto</span>
      <h2 class="pf-title">Trabajemos juntos</h2>
      <p class="pf-lead">¿Tienes un proyecto en mente? Cuéntame y te respondo lo antes posible.</p>
    </div>

    <div class="pf-contact">
      <aside class="pf-contact__info">
        <a class="pf-contact__item" href="mailto:luisguerrero12387@gmail.com">
          <span class="pf-contact__icon"><i class="fa fa-envelope"></i></span>
          <span>
            <span class="pf-contact__k">Email</span>
            <span class="pf-contact__v">luisguerrero12387@gmail.com</span>
          </span>
        </a>
        <a class="pf-contact__item" href="tel:+584244095467">
          <span class="pf-contact__icon"><i class="fa fa-phone"></i></span>
          <span>
            <span class="pf-contact__k">Teléfono</span>
            <span class="pf-contact__v">+58 424 4095467</span>
          </span>
        </a>
        <div class="pf-contact__item">
          <span class="pf-contact__icon"><i class="fa fa-map-marker"></i></span>
          <span>
            <span class="pf-contact__k">Ubicación</span>
            <span class="pf-contact__v">Valencia, Carabobo — Venezuela</span>
          </span>
        </div>
      </aside>

      <form class="pf-contact__form" name="form" [formGroup]="fg" (ngSubmit)="sendEmail()">
        <div class="pf-field">
          <label for="c-name">Nombre</label>
          <input id="c-name" class="form-control" type="text" placeholder="Tu nombre" formControlName="name"
            [ngClass]="{ 'is-invalid': validFields('name') }" />
        </div>
        <div class="pf-field">
          <label for="c-subject">Asunto</label>
          <input id="c-subject" class="form-control" type="text" placeholder="¿De qué se trata?"
            formControlName="subject" [ngClass]="{ 'is-invalid': validFields('subject') }" />
        </div>
        <div class="pf-field">
          <label for="c-email">Email</label>
          <input id="c-email" class="form-control" type="email" placeholder="tucorreo@ejemplo.com"
            formControlName="email" [ngClass]="{ 'is-invalid': validFields('email') }"
            pattern="^([a-zA-Z0-9_\-\.]+)@([a-zA-Z0-9_\-\.]+)\.([a-zA-Z]{2,5})$" />
        </div>
        <div class="pf-field">
          <label for="c-message">Mensaje</label>
          <textarea id="c-message" class="form-control" rows="4" placeholder="Cuéntame sobre tu proyecto"
            formControlName="message" [ngClass]="{ 'is-invalid': validFields('message') }"></textarea>
        </div>
        <button [disabled]="!fg.valid" class="pf-btn" type="submit">
          <i class="fa fa-paper-plane"></i> Enviar mensaje
        </button>
      </form>
    </div>
  </div>
</section>
