<section class="section" id="about">

      <h2 class="pf-title">Sobre mí</h2>
    </div>

    <div class="pf-about">
      <div class="pf-about__bio" data-aos="fade-up">
        <p class="pf-about__intro">{{ about1 }}</p>
        <ul class="pf-about__list">
          <li *ngFor="let item of about2 | split">
            <i class="fa fa-check"></i><span>{{ item }}</span>

        </ul>
      </div>

        <ul class="pf-facts">
          <li>
            <span class="pf-facts__k">Ubicación</span>

          </li>
          <li>
            <span class="pf-facts__k">Email</span>
            <span class="pf-facts__v">luisguerrero12387@gmail.com</span>
          </li>
          <li>
            <span class="pf-facts__k">Teléfono</span>
            <span class="pf-facts__v">+58 424 4095467</span>
          </li>
          <li>
            <span class="pf-facts__k">Idiomas</span>
            <span class="pf-facts__v">Español (nativo) · Inglés (avanzado)</span>
          </li>
          <li>
            <span class="pf-facts__k">Modalidad</span>
            <span class="pf-facts__v">Remoto · Freelance</span>
          </li>
        </ul>
      </aside>
    </div>
  </div>
</section>
